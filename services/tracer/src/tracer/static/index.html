<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Tracer — InmobiliarIA</title>
    <style>
      :root {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #0f1115;
        color: #e6e6e6;
      }
      body {
        margin: 0;
        display: grid;
        grid-template-columns: 320px 1fr;
        height: 100vh;
      }
      aside {
        background: #15181f;
        border-right: 1px solid #262a33;
        overflow-y: auto;
        padding: 1rem;
      }
      aside h2 {
        margin: 0 0 0.5rem;
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #8a8f99;
      }
      .trace-item {
        cursor: pointer;
        padding: 0.6rem 0.75rem;
        border-radius: 6px;
        margin-bottom: 0.4rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.78rem;
        line-height: 1.3;
        background: #1c2029;
        border: 1px solid transparent;
      }
      .trace-item:hover {
        border-color: #3a4150;
      }
      .trace-item.active {
        border-color: #4f8df0;
        background: #1f2733;
      }
      .trace-item .meta {
        color: #8a8f99;
        margin-top: 0.25rem;
        font-size: 0.7rem;
      }
      main {
        padding: 1.25rem 1.5rem;
        overflow-y: auto;
      }
      h1 {
        margin: 0 0 0.25rem;
        font-size: 1.1rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .empty {
        color: #8a8f99;
        margin-top: 4rem;
        text-align: center;
      }
      .row {
        display: grid;
        grid-template-columns: 200px 160px 1fr;
        gap: 0.75rem;
        padding: 0.5rem 0;
        border-bottom: 1px solid #1c2029;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.78rem;
        align-items: baseline;
      }
      .row .ts {
        color: #8a8f99;
      }
      .row .svc {
        font-weight: 600;
        padding: 0.1rem 0.5rem;
        border-radius: 4px;
        background: #1f2733;
        text-align: center;
        white-space: nowrap;
      }
      .svc[data-svc="api_gateway"] { color: #ffd166; }
      .svc[data-svc="process_user_prompt"] { color: #06d6a0; }
      .svc[data-svc="vector_query"] { color: #4f8df0; }
      .svc[data-svc="ranking_and_rendering"] { color: #f78ca2; }
      .svc[data-svc="data_ingestion"] { color: #c39bd3; }
      .row .msg {
        white-space: pre-wrap;
        word-break: break-word;
      }
      .pill {
        display: inline-block;
        padding: 0.1rem 0.45rem;
        border-radius: 4px;
        background: #1f2733;
        color: #c9c9c9;
        font-size: 0.7rem;
        margin-left: 0.4rem;
      }
    </style>
  </head>
  <body>
    <aside>
      <h2>Recientes</h2>
      <div id="list"></div>
    </aside>
    <main>
      <div id="detail" class="empty">Selecciona una traza, o envía una búsqueda desde el frontend.</div>
    </main>

    <script>
      const list = document.getElementById("list");
      const detail = document.getElementById("detail");
      let activeId = new URLSearchParams(location.search).get("id") || null;

      async function refreshList() {
        const res = await fetch("/traces");
        const { traces } = await res.json();
        list.innerHTML = traces.map(t => `
          <div class="trace-item ${t.request_id === activeId ? "active" : ""}" data-id="${t.request_id}">
            <div>${t.request_id.slice(0, 8)}…</div>
            <div class="meta">
              ${t.services.length} svc · ${t.entry_count} entradas
            </div>
          </div>
        `).join("") || `<div class="empty">Sin trazas todavía.</div>`;
        list.querySelectorAll(".trace-item").forEach(el => {
          el.onclick = () => { activeId = el.dataset.id; renderDetail(); refreshList(); };
        });
      }

      async function renderDetail() {
        if (!activeId) {
          detail.className = "empty";
          detail.textContent = "Selecciona una traza, o envía una búsqueda desde el frontend.";
          return;
        }
        try {
          const res = await fetch(`/trace/${activeId}`);
          if (!res.ok) {
            detail.className = "empty";
            detail.textContent = res.status === 404
              ? "Traza no encontrada todavía. Esperando logs…"
              : `Error ${res.status}`;
            return;
          }
          const data = await res.json();
          detail.className = "";
          detail.innerHTML = `
            <h1>${data.request_id}<span class="pill">${data.entries.length} entradas</span></h1>
            <div>
              ${data.entries.map(e => `
                <div class="row">
                  <span class="ts">${e.timestamp}</span>
                  <span class="svc" data-svc="${e.service}">${e.service}</span>
                  <span class="msg">${escapeHtml(e.line)}</span>
                </div>
              `).join("")}
            </div>
          `;
        } catch (err) {
          detail.className = "empty";
          detail.textContent = String(err);
        }
      }

      function escapeHtml(s) {
        return s.replace(/[&<>"']/g, c => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
        }[c]));
      }

      refreshList();
      renderDetail();
      setInterval(() => { refreshList(); renderDetail(); }, 2000);
    </script>
  </body>
</html>
