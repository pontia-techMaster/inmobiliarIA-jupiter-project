name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          version: latest

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Unit Tests
        run: uv run pytest . viviendas_data/scrapper/tests/ -v --tb=short -r fEsxXw --cov=. --cov-report=term-missing

      - name: Test Summary
        if: always()
        run: |
          echo "================================"
          echo "✓ Unit Tests Completed"
          echo "================================"
