name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Code Linting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          version: latest

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint - Code Style (Flake8)
        run: |
          echo "Running Flake8..."
          uv run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
          uv run flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true

      - name: Lint - Code Analysis (Pylint)
        run: |
          echo "Running Pylint..."
          uv run pylint --rcfile=.pylintrc **/*.py || true

      - name: Format Check (Black)
        run: |
          echo "Checking code formatting with Black..."
          uv run black --check . --diff || true

      - name: Import Sort Check (isort)
        run: |
          echo "Checking import sorting..."
          uv run isort --check-only . --diff || true

      - name: Lint Summary
        if: always()
        run: |
          echo "================================"
          echo "✓ Lint checks completed"
          echo "================================"
