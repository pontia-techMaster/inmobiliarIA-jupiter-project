name: Deploy · api-gateway

on:
  workflow_dispatch:
    inputs:
      action:
        description: "`preview` (dry-run) or `up` (apply)"
        type: choice
        default: preview
        options: [preview, up]
      stack:
        description: "Pulumi stack (env)"
        type: choice
        default: dev
        options: [dev]

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-service.yml
    secrets: inherit
    with:
      service: api-gateway
      stack: ${{ inputs.stack }}
      action: ${{ inputs.action }}
