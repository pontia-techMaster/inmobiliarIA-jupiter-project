name: Deploy · results-api

on:
  workflow_dispatch:
    inputs:
      action:
        description: "`preview` (dry-run) or `up` (apply)"
        type: choice
        default: preview
        options: [preview, up]
      stack:
        description: "Pulumi stack (env)"
        type: choice
        default: dev
        options: [dev]

permissions:
  id-token: write   # OIDC for aws-actions/configure-aws-credentials
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-service.yml
    secrets: inherit
    with:
      service: results-api
      stack: ${{ inputs.stack }}
      action: ${{ inputs.action }}
